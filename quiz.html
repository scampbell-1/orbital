<html>
<head>
    <title>Quiz</title>
</head>
<body>
    <h1>Quiz</h1>
    <form>
        <div>
            <label for="question">Question</label>
            <input type="text" id="question" name="question" />
        </div>
        <div>
            <label for="answer0">A</label>
            <input type="radio" id="answer0" name="answer" value="0" />
            <input type="text" id="answer0" name="answerText0" />
        </div>
        <div>
            <label for="answer1">B</label>
            <input type="radio" id="answer1" name="answer" value="1" />
            <input type="text" id="answer1" name="answerText1" />
        </div>
        <div>
            <label for="answer2">C</label>
            <input type="radio" id="answer2" name="answer" value="2" />
            <input type="text" id="answer2" name="answerText2" />
        </div>
        <div>
            <label for="answer3">D</label>
            <input type="radio" id="answer3" name="answer" value="3" />
            <input type="text" id="answer3" name="answerText3" />
        </div>
        <input type="submit" value="Submit" />
    </form>
</body>
</html>
