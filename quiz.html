<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="quiz-container">
        <h1>Quiz</h1>
        <div id="question"></div>
        <div id="options"></div>
        <button onclick="nextQuestion()">Next</button>
    </div>
    <script>
        const questions = [
            { question: 'Foundation Question 1?', options: ['A', 'B', 'C', 'D'], answer: 'A' },
            { question: 'Foundation Question 2?', options: ['A', 'B', 'C', 'D'], answer: 'B' },
            // ...additional Foundation questions...
            { question: 'Intermediate Question 1?', options: ['A', 'B', 'C', 'D'], answer: 'B' },
            // ...additional Intermediate questions...
            { question: 'Expert Question 1?', options: ['A', 'B', 'C', 'D'], answer: 'C' },
            // ...additional Expert questions...
        ];

        function randomizeCorrectAnswers() {
            questions.forEach(question => {
                const correctAnswer = question.answer;
                const options = question.options;
                const correctIndex = options.indexOf(correctAnswer);
                // Shuffle options
                for (let i = options.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [options[i], options[j]] = [options[j], options[i]];
                }
                // Update the index of the correct answer
                question.answer = options.indexOf(correctAnswer);
            });
        }

        function startLevel() {
            randomizeCorrectAnswers();
            nextQuestion();
        }

        function nextQuestion() {
            // Logic to display the next question...
        }
    </script>
</body>
</html>
